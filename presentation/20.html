<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Smart Mobility Presentation</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&amp;family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: "Inter", sans-serif;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 100%);
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .slide-container {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 1280px;
            max-height: 720px;
            overflow: hidden;
            background: radial-gradient(ellipse at center, #0f172a 0%, #020617 100%);
            box-shadow: 0 0 100px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Dark overlay for better text contrast */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(5, 5, 16, 0.85);
            z-index: 1;
        }

        /* Glassmorphism Card - Simplified for Closing */
        .glass-card {
            position: relative;
            z-index: 10;
            background-color: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 80px 100px;
            text-align: center;
            box-shadow: 0 0 50px rgba(0, 243, 255, 0.05);
            max-width: 1000px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: card-appear 1s ease-out forwards;
        }

        @keyframes card-appear {
            0% {
                transform: scale(0.9);
                opacity: 0;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* Neon Accents */
        .neon-line {
            width: 160px;
            height: 4px;
            background-color: #BC13FE;
            margin: 40px auto;
            box-shadow: 0 0 20px #BC13FE;
            border-radius: 2px;
            animation: line-grow 1.5s ease-out forwards;
        }

        @keyframes line-grow {
            0% {
                width: 0;
                opacity: 0;
            }

            100% {
                width: 160px;
                opacity: 1;
            }
        }

        .corner-accent {
            position: absolute;
            width: 40px;
            height: 40px;
            border: 2px solid #00F3FF;
            z-index: 11;
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.5);
        }

        .top-right {
            top: -10px;
            right: -10px;
            border-left: none;
            border-bottom: none;
        }

        .bottom-left {
            bottom: -10px;
            left: -10px;
            border-right: none;
            border-top: none;
        }

        /* Typography */
        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 90px;
            font-weight: 900;
            color: #FFFFFF;
            margin: 0;
            line-height: 1.1;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 0 0 30px rgba(188, 19, 254, 0.6);
            animation: text-glow-pulse 3s infinite alternate;
        }

        @keyframes text-glow-pulse {
            0% {
                text-shadow: 0 0 20px rgba(188, 19, 254, 0.4);
            }

            100% {
                text-shadow: 0 0 40px rgba(188, 19, 254, 0.8), 0 0 10px #fff;
            }
        }

        /* Tech Elements */
        .scan-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background-color: rgba(188, 19, 254, 0.3);
            box-shadow: 0 0 10px rgba(188, 19, 254, 0.3);
            animation: scan 8s linear infinite;
            z-index: 5;
            opacity: 0.4;
        }

        @keyframes scan {
            0% {
                top: 0;
                opacity: 0;
            }

            10% {
                opacity: 1;
            }

            90% {
                opacity: 1;
            }

            100% {
                top: 100%;
                opacity: 0;
            }
        }

        .tech-ring {
            position: absolute;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.05);
            z-index: 2;
        }

        .r1 {
            width: 900px;
            height: 900px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-style: dotted;
            animation: rotate 60s linear infinite;
        }

        .r2 {
            width: 1100px;
            height: 1100px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-color: rgba(0, 243, 255, 0.05);
            animation: rotate-rev 80s linear infinite;
        }

        @keyframes rotate {
            from {
                transform: translate(-50%, -50%) rotate(0deg);
            }

            to {
                transform: translate(-50%, -50%) rotate(360deg);
            }
        }

        @keyframes rotate-rev {
            from {
                transform: translate(-50%, -50%) rotate(360deg);
            }

            to {
                transform: translate(-50%, -50%) rotate(0deg);
            }
        }

        /* Floating particles */
        .particle {
            position: absolute;
            background-color: #fff;
            border-radius: 50%;
            opacity: 0.4;
            animation: float 15s infinite ease-in-out;
        }

        .p1 {
            width: 3px;
            height: 3px;
            top: 15%;
            left: 15%;
            background-color: #00F3FF;
        }

        .p2 {
            width: 4px;
            height: 4px;
            top: 85%;
            left: 85%;
            background-color: #BC13FE;
            animation-delay: -5s;
        }

        .p3 {
            width: 2px;
            height: 2px;
            top: 45%;
            left: 10%;
            animation-delay: -2s;
        }

        .p4 {
            width: 3px;
            height: 3px;
            top: 25%;
            left: 90%;
            background-color: #00F3FF;
            animation-delay: -8s;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-30px);
            }
        }
    </style>
</head>



<body>
    <div class="slide-container">
        <div style="position: relative; width: 100%; height: 100%;">
            <!-- Background Overlay -->
            <div class="overlay"></div>
            <!-- Animated Tech Elements -->
            <div class="scan-line"></div>
            <div class="tech-ring r1"></div>
            <div class="tech-ring r2"></div>
            <div class="particle p1"></div>
            <div class="particle p2"></div>
            <div class="particle p3"></div>
            <div class="particle p4"></div>
            <!-- Main Content Card -->
            <div class="glass-card">
                <!-- Decorative Corners -->
                <div class="corner-accent top-right"></div>
                <div class="corner-accent bottom-left"></div>
                <!-- Closing Content -->
                <h1 class="glow-text">THANK YOU</h1>
                <div class="neon-line" style="margin-top: 20px;"></div>
                <p
                    style="margin-top: 20px; font-size: 18px; color: #00F3FF; letter-spacing: 4px; font-family: 'Space Grotesk'; font-weight: 700;">
                    QUESTIONS &amp; DISCUSSION</p>
            </div>


        </div>
    </div>
    </div>

    <script>
        document.addEventListener('keydown', function (event) {
            const currentPath = window.location.pathname;
            const currentFile = currentPath.substring(currentPath.lastIndexOf('/') + 1) || '1.html';
            const currentNum = parseInt(currentFile.split('.')[0]) || 1;
            let nextNum;
            if (event.code === 'ArrowRight' || event.code === 'Space') {
                nextNum = currentNum + 1;
                if (nextNum <= 20) window.location.href = nextNum + '.html';
            } else if (event.code === 'ArrowLeft') {
                nextNum = currentNum - 1;
                if (nextNum >= 1) window.location.href = nextNum + '.html';
            }
        });
    </script>

</body>



</html>
